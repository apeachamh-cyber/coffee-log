<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5EFE4">
<title>お問い合わせ — Drippin</title>
<meta name="description" content="Drippin（カフェジャーナルアプリ）へのお問い合わせ。ご質問・ご要望・不具合のご報告はこちらから。">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@300;350;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5EFE4;
  --paper-deep:#EDE4D3;
  --espresso:#2B2018;
  --espresso-deep:#1C140E;
  --roast:#4A372A;
  --caramel:#B07D4F;
  --caramel-deep:#8C5E36;
  --gold:#E8C496;
  --milk:#FDFBF6;
  --line:rgba(43,32,24,.16);
  --line-soft:rgba(43,32,24,.08);
  --serif:'Playfair Display',serif;
  --serif-jp:'Shippori Mincho',serif;
  --sans:'Noto Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);font-weight:400;color:var(--espresso);
  background:var(--paper);letter-spacing:.01em;line-height:1.9;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--caramel);color:var(--milk)}
.wrap{max-width:560px;margin:0 auto;padding:0 22px 100px}

header{padding:48px 0 26px;border-bottom:1px solid var(--line-soft);margin-bottom:30px}
.back{display:inline-block;margin-bottom:26px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--caramel-deep);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
.back:hover{border-bottom-color:var(--caramel-deep)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.brand img{width:40px;height:40px}
.brand .nm{font-family:var(--serif);font-style:italic;font-weight:700;font-size:23px;letter-spacing:.01em}
h1{font-family:var(--serif-jp);font-weight:700;font-size:29px;letter-spacing:.03em;line-height:1.4}
.lead{margin-top:14px;font-size:14px;font-weight:350;color:var(--roast)}

form{display:flex;flex-direction:column;gap:20px}
.field{display:flex;flex-direction:column;gap:8px}
label{font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--caramel-deep);font-weight:500}
label .opt{text-transform:none;letter-spacing:.02em;font-size:11px;color:var(--caramel);margin-left:6px}
label .req{text-transform:none;letter-spacing:.02em;font-size:11px;color:var(--caramel-deep);margin-left:6px}
input[type=text],input[type=email],textarea{
  font-family:var(--sans);font-size:15px;color:var(--espresso);
  background:var(--milk);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;width:100%;transition:border-color .2s,box-shadow .2s;
}
input::placeholder,textarea::placeholder{color:rgba(43,32,24,.32)}
input:focus,textarea:focus{outline:none;border-color:var(--caramel);box-shadow:0 0 0 3px rgba(176,125,79,.14)}
textarea{min-height:150px;resize:vertical;line-height:1.8}
.hp{position:absolute;left:-9999px;opacity:0;height:0;overflow:hidden}

button.send{
  font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.08em;
  background:var(--espresso);color:var(--paper);border:none;border-radius:14px;
  padding:16px;cursor:pointer;transition:transform .2s,opacity .2s;margin-top:4px;
}
button.send:hover{transform:translateY(-1px)}
button.send:active{transform:scale(.99)}
button.send:disabled{opacity:.5;cursor:default;transform:none}

.formnote{font-size:11.5px;font-weight:350;color:var(--caramel-deep);line-height:1.7;margin-top:2px}
.formnote a{color:var(--caramel-deep);text-decoration:underline;text-underline-offset:2px}

/* 結果表示 */
.result{display:none;text-align:center;padding:40px 10px}
.result.show{display:block;animation:rise .5s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.result .ic{font-size:42px;margin-bottom:14px}
.result h2{font-family:var(--serif-jp);font-weight:600;font-size:22px;letter-spacing:.04em;margin-bottom:10px}
.result p{font-size:14px;font-weight:350;color:var(--roast)}
.result .again{display:inline-block;margin-top:22px;font-size:13px;color:var(--caramel-deep);text-decoration:underline;cursor:pointer;background:none;border:none}

/* 未設定バナー（access_key未差し替え時の保険） */
.cfgwarn{display:none;background:#fff4e8;border:1px solid var(--caramel);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--caramel-deep);margin-bottom:22px}

footer{text-align:center;padding:46px 0 0;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--caramel)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="back" href="./index.html">‹ Back to Drippin</a>
    <div class="brand"><img src="icon.svg" alt="Drippin"><span class="nm">Drippin</span></div>
    <h1>お問い合わせ</h1>
    <p class="lead">ご質問・ご要望・不具合のご報告など、お気軽にお寄せください。いただいた内容は運営者にのみ届きます。</p>
  </header>

  <div class="cfgwarn" id="cfgwarn">⚠ このフォームは現在準備中です。お手数ですが、しばらくしてから再度お試しください。</div>

  <form id="cform" autocomplete="on">
    <input type="hidden" name="access_key" value="6d7fc3f6-e7c5-4369-9b67-fbcacc232f68">
    <input type="hidden" name="subject" value="【Drippin】お問い合わせが届きました">
    <input type="hidden" name="from_name" value="Drippin お問い合わせフォーム">
    <input type="checkbox" name="botcheck" class="hp" tabindex="-1" autocomplete="off">

    <div class="field">
      <label for="name">お名前<span class="opt">任意</span></label>
      <input type="text" id="name" name="name" placeholder="例：山田 太郎">
    </div>
    <div class="field">
      <label for="email">返信先メール<span class="opt">任意</span></label>
      <input type="email" id="email" name="email" placeholder="返信が必要な場合のみ">
    </div>
    <div class="field">
      <label for="message">お問い合わせ内容<span class="req">必須</span></label>
      <textarea id="message" name="message" required placeholder="ご質問・ご要望・不具合の内容をご記入ください。"></textarea>
    </div>

    <button type="submit" class="send" id="sendBtn">送信する</button>
    <p class="formnote">送信は <a href="https://web3forms.com" target="_blank" rel="noopener">Web3Forms</a> を経由します。お預かりした情報の取り扱いは<a href="./privacy.html">プライバシーポリシー</a>をご覧ください。</p>
  </form>

  <div class="result" id="result">
    <div class="ic">☕</div>
    <h2 id="rTitle">送信しました</h2>
    <p id="rMsg">お問い合わせありがとうございます。<br>内容を確認のうえ、必要に応じてご返信いたします。</p>
    <button class="again" id="againBtn" type="button">もう一度送る</button>
  </div>

  <footer>Drippin · Drip by drip, pin by pin</footer>
</div>

<script>
(function(){
  var form=document.getElementById('cform');
  var btn=document.getElementById('sendBtn');
  var result=document.getElementById('result');
  var rTitle=document.getElementById('rTitle');
  var rMsg=document.getElementById('rMsg');
  var KEY=form.access_key.value;

  // access_key 未設定なら準備中バナーを出して送信を止める
  if(!KEY || KEY==='WEB3FORMS_ACCESS_KEY'){
    document.getElementById('cfgwarn').style.display='block';
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    if(!KEY || KEY==='WEB3FORMS_ACCESS_KEY'){
      document.getElementById('cfgwarn').style.display='block';
      window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    btn.disabled=true; btn.textContent='送信中…';
    var data=Object.fromEntries(new FormData(form).entries());
    try{
      var res=await fetch('https://api.web3forms.com/submit',{
        method:'POST',
        headers:{'Content-Type':'application/json',Accept:'application/json'},
        body:JSON.stringify(data)
      });
      var j=await res.json();
      if(j.success){
        form.style.display='none';
        result.classList.add('show');
        window.scrollTo({top:0,behavior:'smooth'});
      }else{
        throw new Error(j.message||'送信に失敗しました');
      }
    }catch(err){
      form.style.display='none';
      rTitle.textContent='送信できませんでした';
      rMsg.innerHTML='お手数ですが、時間をおいて再度お試しください。<br><small style="color:var(--caramel-deep)">'+(err.message||'')+'</small>';
      result.querySelector('.ic').textContent='⚠';
      result.classList.add('show');
    }finally{
      btn.disabled=false; btn.textContent='送信する';
    }
  });

  document.getElementById('againBtn').addEventListener('click',function(){
    result.classList.remove('show');
    result.querySelector('.ic').textContent='☕';
    rTitle.textContent='送信しました';
    rMsg.innerHTML='お問い合わせありがとうございます。<br>内容を確認のうえ、必要に応じてご返信いたします。';
    form.reset();
    form.style.display='flex';
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drippin Lab — AI 試運転シアター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5EFE4;--paper2:#EDE4D3;--espresso:#2B2018;--roast:#4A372A;
  --caramel:#B07D4F;--caramel-deep:#8C5E36;--milk:#FDFBF6;--gold:#E0BC85;
  --line:rgba(43,32,24,.14);--serif:'Playfair Display',serif;--sans:'Noto Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);color:var(--espresso);background:
  radial-gradient(120% 80% at 80% 0%,#2a1f16 0%,#1a130d 55%,#0d0907 100%) fixed;
  min-height:100vh;overflow:hidden;letter-spacing:.01em}
.wrap{height:100vh;display:flex;flex-direction:column}

/* top bar */
.top{display:flex;align-items:center;gap:18px;padding:14px 22px;border-bottom:1px solid rgba(224,188,133,.18)}
.brand{font-family:var(--serif);font-style:italic;font-weight:600;font-size:20px;color:var(--gold);white-space:nowrap}
.brand small{font-family:var(--sans);font-style:normal;font-weight:400;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(224,188,133,.6);display:block;margin-top:1px}
.pdca{display:flex;gap:6px;margin-left:6px}
.pdca .st{font-size:11px;letter-spacing:.12em;color:rgba(245,239,228,.4);padding:6px 12px;border-radius:99px;border:1px solid rgba(224,188,133,.16);transition:all .3s}
.pdca .st.on{background:var(--gold);color:#2a1f16;border-color:var(--gold);font-weight:700}

/* cycle selector */
.cycles{display:flex;align-items:center;gap:5px;margin-left:10px}
.cycles-label{font-size:10px;letter-spacing:.12em;color:rgba(224,188,133,.5);white-space:nowrap;text-transform:uppercase}
.cyc{font-size:11px;padding:5px 10px;border-radius:99px;border:1px solid rgba(224,188,133,.18);color:rgba(245,239,228,.5);cursor:pointer;transition:all .22s;white-space:nowrap}
.cyc:hover{border-color:rgba(224,188,133,.4);color:rgba(245,239,228,.8)}
.cyc.on{background:rgba(224,188,133,.18);border-color:var(--caramel);color:var(--gold);font-weight:700}
.cyc.latest::after{content:'●';font-size:7px;color:#8fbf6f;vertical-align:super;margin-left:2px}

.tabs{display:flex;gap:8px;margin-left:auto}
.ptab{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid rgba(224,188,133,.18);color:rgba(245,239,228,.7);
  border-radius:99px;padding:6px 13px 6px 8px;font-size:12px;cursor:pointer;transition:all .25s}
.ptab .e{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:rgba(224,188,133,.16);font-size:14px}
.ptab.on{background:var(--gold);color:#2a1f16;font-weight:700;border-color:var(--gold)}
.ptab.on .e{background:rgba(43,32,24,.18)}

/* stage */
.stage{flex:1;display:flex;gap:30px;align-items:center;justify-content:center;padding:24px 36px;min-height:0}

/* phone */
.phone{position:relative;width:300px;flex:none;border-radius:42px;background:#0a0705;padding:12px;
  box-shadow:0 30px 80px rgba(0,0,0,.6),inset 0 0 0 2px rgba(224,188,133,.22);}
.phone::before{content:"";position:absolute;top:20px;left:50%;transform:translateX(-50%);width:90px;height:22px;background:#0a0705;border-radius:99px;z-index:3}
.screen{position:relative;width:100%;aspect-ratio:300/620;border-radius:32px;overflow:hidden;background:#1a130d}
.screen img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;opacity:0;transition:opacity .6s ease}
.screen img.show{opacity:1}
.ripple{position:absolute;width:46px;height:46px;border-radius:50%;border:2px solid var(--gold);opacity:0;pointer-events:none;transform:translate(-50%,-50%)}
.ripple.go{animation:rip .8s ease-out}
@keyframes rip{0%{opacity:.9;width:8px;height:8px}100%{opacity:0;width:80px;height:80px}}
.finger{position:absolute;font-size:30px;opacity:0;transition:all .5s cubic-bezier(.2,.7,.2,1);transform:translate(-30%,-20%) rotate(-18deg);filter:drop-shadow(0 4px 6px rgba(0,0,0,.4))}
.finger.show{opacity:1}
.phone .nowscreen{position:absolute;bottom:-30px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:.1em;color:rgba(224,188,133,.65)}

/* characters */
.crew{flex:1;max-width:560px;align-self:stretch;display:flex;flex-direction:column;justify-content:center;gap:18px;min-width:0}
.bubble{background:var(--milk);border-radius:22px 22px 22px 6px;padding:18px 22px;box-shadow:0 18px 50px rgba(0,0,0,.4);
  font-size:16px;line-height:1.85;color:var(--espresso);min-height:96px;position:relative;border:1px solid rgba(224,188,133,.4)}
.bubble .who{font-size:11px;letter-spacing:.14em;color:var(--caramel-deep);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.bubble.bug{background:#fff3ec;border-color:#e0a98c}
.bubble.ok{background:#eef5ea;border-color:#b3cda3}
.cursor{display:inline-block;width:2px;height:1em;background:var(--caramel);vertical-align:-2px;animation:bl .7s steps(2) infinite}
@keyframes bl{50%{opacity:0}}
.roster{display:flex;gap:14px;justify-content:center}
.char{display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.4;transition:all .35s;filter:grayscale(.5)}
.char.on{opacity:1;filter:none}
.char .av{width:78px;height:78px;border-radius:24px;display:grid;place-items:center;font-size:38px;position:relative;
  background:linear-gradient(160deg,#3a2b20,#241a12);box-shadow:0 10px 26px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1)}
.char.on .av{background:linear-gradient(160deg,var(--caramel),var(--caramel-deep));box-shadow:0 12px 30px rgba(176,125,79,.5)}
.char.on .av{animation:bob 1.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.char .nm{font-size:11px;color:rgba(245,239,228,.7);letter-spacing:.06em}
.char.on .nm{color:var(--gold);font-weight:700}
.char .av .eye{position:absolute;top:30px;width:7px;height:7px;background:#fff;border-radius:50%}
.char .av .eye.l{left:24px}.char .av .eye.r{right:24px}
.char.on .av .eye{animation:blink 3.2s infinite}
@keyframes blink{0%,94%,100%{transform:scaleY(1)}97%{transform:scaleY(.1)}}

/* meeting mode */
.crew.meeting .bubble{border-radius:22px}
.banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);z-index:40;
  background:rgba(13,9,7,.78);border:1px solid var(--gold);border-radius:26px;padding:30px 44px;text-align:center;
  opacity:0;pointer-events:none;transition:all .5s;backdrop-filter:blur(8px)}
.banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.banner h2{font-family:var(--serif);font-style:italic;color:var(--gold);font-size:30px}
.banner p{color:rgba(245,239,228,.75);font-size:13px;margin-top:8px;letter-spacing:.1em}

/* bottom */
.bottom{padding:12px 22px 16px;border-top:1px solid rgba(224,188,133,.18)}
.bar{height:5px;border-radius:99px;background:rgba(224,188,133,.15);overflow:hidden}
.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--caramel),var(--gold));transition:width .3s}
.ctrls{display:flex;align-items:center;gap:14px;margin-top:11px;color:rgba(245,239,228,.7);font-size:12px}
.btn{background:rgba(255,255,255,.06);border:1px solid rgba(224,188,133,.22);color:var(--gold);border-radius:99px;
  padding:8px 16px;cursor:pointer;font-family:var(--sans);font-size:13px;transition:all .2s}
.btn:hover{background:rgba(224,188,133,.16)}
.spd{display:flex;gap:4px}
.spd b{cursor:pointer;padding:6px 10px;border-radius:8px;font-size:11px;color:rgba(245,239,228,.5)}
.spd b.on{background:var(--gold);color:#2a1f16}
.findings{margin-left:auto;display:flex;gap:8px;align-items:center;font-size:11px;color:rgba(245,239,228,.55)}
.dot{width:9px;height:9px;border-radius:50%}.dot.h{background:#e07a5a}.dot.m{background:#e0b84f}.dot.ok{background:#8fbf6f}

.toast{position:fixed;top:74px;right:24px;background:#fff3ec;color:#9a4a2e;border:1px solid #e0a98c;border-radius:14px;
  padding:12px 18px;font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.3);transform:translateX(120%);transition:transform .5s cubic-bezier(.2,.8,.2,1);z-index:60;max-width:320px}
.toast.show{transform:none}
.loading{position:fixed;inset:0;display:grid;place-items:center;color:var(--gold);font-family:var(--serif);font-style:italic;font-size:22px}
.report-btn{position:fixed;right:24px;bottom:90px;z-index:50}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(440px,90vw);background:var(--milk);box-shadow:-20px 0 60px rgba(0,0,0,.5);
  transform:translateX(105%);transition:transform .4s cubic-bezier(.2,.8,.2,1);z-index:70;overflow-y:auto;padding:26px 24px}
.drawer.open{transform:none}
.drawer h3{font-family:var(--serif);font-size:22px;color:var(--espresso)}
.drawer pre{white-space:pre-wrap;font-family:var(--sans);font-size:13px;line-height:1.9;color:var(--roast);margin-top:14px}
.drawer .x{position:absolute;top:16px;right:18px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--roast)}
@media(max-width:880px){.stage{flex-direction:column;gap:18px;padding:14px}.phone{width:200px}.crew{max-width:none}.cycles{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">Drippin Lab<small>AI 試運転シアター</small></div>
    <div class="pdca" id="pdca">
      <span class="st" data-p="plan">Plan 作戦</span>
      <span class="st" data-p="do">Do 疑似利用</span>
      <span class="st" data-p="check">Check 検証</span>
      <span class="st" data-p="act">Act 改善</span>
    </div>
    <div class="cycles" id="cycleBar">
      <span class="cycles-label">CYCLE</span>
      <div id="cycleChips"></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen" id="screen">
        <span class="ripple" id="ripple"></span>
        <span class="finger" id="finger">👆</span>
      </div>
      <div class="nowscreen" id="nowscreen">—</div>
    </div>
    <div class="crew" id="crew">
      <div class="bubble" id="bubble"><div class="who" id="who">—</div><span id="say"></span><span class="cursor"></span></div>
      <div class="roster" id="roster"></div>
    </div>
    <div class="banner" id="banner"><h2 id="bannerT"></h2><p id="bannerP"></p></div>
  </div>

  <div class="bottom">
    <div class="bar"><i id="prog"></i></div>
    <div class="ctrls">
      <button class="btn" id="play">⏸ 一時停止</button>
      <div class="spd"><b data-s="0.6">0.6x</b><b data-s="1" class="on">1x</b><b data-s="1.8">1.8x</b></div>
      <button class="btn" id="loop">🔁 ループ: ON</button>
      <div class="findings" id="findStat"></div>
    </div>
  </div>
</div>

<button class="btn report-btn" id="reportBtn">📋 このAIのレポート</button>
<div class="drawer" id="drawer"><button class="x" id="drawerX">✕</button><h3 id="drawerT">レポート</h3><pre id="drawerC"></pre></div>
<div class="toast" id="toast"></div>
<div class="loading" id="loading">☕ 劇場を準備中…</div>

<script>
const CHARS={strategy:{emoji:'📋',name:'戦略長'},reviewer:{emoji:'🔍',name:'レビ子'},tester:{emoji:'☕',name:'テスター'}};
let session=null,timeline=[],idx=0,speed=1,playing=true,loop=true,typing=null,sceneTimer=null;
let knownLastUpdated=null, currentCycleIdx=null; // null = 最新
const $=s=>document.getElementById(s);

// ── session.json 読み込み（新旧フォーマット両対応）──
function extractCycles(raw) {
  // 新フォーマット: { cycles:[...], lastUpdated }
  if (raw.cycles && Array.isArray(raw.cycles)) return { cycles: raw.cycles, lastUpdated: raw.lastUpdated || null };
  // 旧フォーマット: { personas, meeting, generatedAt }
  return { cycles: [{ cycleNum: 1, generatedAt: raw.generatedAt, app: raw.app, personas: raw.personas, meeting: raw.meeting }], lastUpdated: raw.generatedAt || null };
}

function loadSession() {
  return fetch('./session.json?t=' + Date.now())
    .then(r => r.json())
    .then(raw => {
      const { cycles, lastUpdated } = extractCycles(raw);
      return { cycles, lastUpdated };
    });
}

// ── 初回読み込み ──
loadSession().then(({ cycles, lastUpdated }) => {
  knownLastUpdated = lastUpdated;
  initWithCycles(cycles, cycles.length - 1); // 最新サイクル
}).catch(() => {
  $('loading').textContent = 'session.json が読み込めません。先に node theater.js を実行してください。';
});

// ── サイクル選択タブを描画 ──
function renderCycleChips(cycles, selectedIdx) {
  const chips = $('cycleChips');
  chips.innerHTML = cycles.map((c, i) => {
    const isLatest = i === cycles.length - 1;
    const num = c.cycleNum || (i + 1);
    return `<span class="cyc${isLatest ? ' latest' : ''}${i === selectedIdx ? ' on' : ''}" data-ci="${i}">#${num}</span>`;
  }).join('');
  chips.querySelectorAll('.cyc').forEach(el => el.onclick = () => switchCycle(+el.dataset.ci));
}

function switchCycle(ci) {
  loadSession().then(({ cycles }) => {
    currentCycleIdx = ci;
    initWithCycles(cycles, ci);
  });
}

// ── サイクルを選んでシアターを（再）初期化 ──
function initWithCycles(cycles, selectedIdx) {
  const cycle = cycles[selectedIdx];
  session = { personas: cycle.personas, meeting: cycle.meeting, app: cycle.app };
  currentCycleIdx = selectedIdx;
  renderCycleChips(cycles, selectedIdx);
  init();
}

// ── 60秒ポーリング：lastUpdated が変わったら最新サイクルを取得 ──
setInterval(() => {
  loadSession().then(({ cycles, lastUpdated }) => {
    if (lastUpdated && lastUpdated !== knownLastUpdated) {
      knownLastUpdated = lastUpdated;
      const num = cycles[cycles.length - 1].cycleNum || cycles.length;
      toast(`🔄 サイクル #${num} 到着！クリックで最新へ`, true);
      renderCycleChips(cycles, currentCycleIdx);
      // 最新サイクルを見ているときは自動更新
      if (currentCycleIdx === null || currentCycleIdx === cycles.length - 2) {
        initWithCycles(cycles, cycles.length - 1);
      }
    }
  }).catch(() => {});
}, 60000);

// ─────────────────────────────────────────
function buildTimeline(){
  timeline=[];
  session.personas.forEach((p,pi)=>{
    p.scenes.forEach(sc=>timeline.push({kind:'scene',pi,p,sc}));
  });
  session.meeting.forEach((m,i)=>timeline.push({kind:'meeting',m,first:i===0}));
}
function init(){
  $('loading').style.display='none';
  idx=0;playing=true;
  buildTimeline();
  $('tabs').innerHTML=session.personas.map((p,i)=>`<div class="ptab" data-pi="${i}"><span class="e">${p.emoji||'🤖'}</span>${p.name||p.key}</div>`).join('');
  $('tabs').querySelectorAll('.ptab').forEach(t=>t.onclick=()=>jumpToPersona(+t.dataset.pi));
  $('roster').innerHTML=['strategy','tester','reviewer'].map(k=>`<div class="char" data-role="${k}"><div class="av" data-emoji="${k}"><span class="eye l"></span><span class="eye r"></span><span class="face"></span></div><div class="nm">${CHARS[k].name}</div></div>`).join('');
  $('play').onclick=()=>{playing=!playing;$('play').textContent=playing?'⏸ 一時停止':'▶ 再生';if(playing)render()};
  $('loop').onclick=()=>{loop=!loop;$('loop').textContent='🔁 ループ: '+(loop?'ON':'OFF')};
  document.querySelectorAll('.spd b').forEach(b=>b.onclick=()=>{speed=+b.dataset.s;document.querySelectorAll('.spd b').forEach(x=>x.classList.toggle('on',x===b))});
  $('reportBtn').onclick=openReport;$('drawerX').onclick=()=>$('drawer').classList.remove('open');
  findStat();
  render();
}

function curPersonaIndex(){const t=timeline[idx];return t&&t.kind==='scene'?t.pi:_lastPi;}
let _lastPi=0,_lastShot=null;

function render(){
  const t=timeline[idx];if(!t){return}
  $('prog').style.width=((idx+1)/timeline.length*100)+'%';
  if(t.kind==='scene'){playScene(t)}else{playMeeting(t)}
}

function setActive(role){
  $('crew').classList.toggle('meeting',false);
  document.querySelectorAll('.char').forEach(c=>c.classList.toggle('on',c.dataset.role===role));
  const tEmoji=(timeline[idx]&&timeline[idx].p&&timeline[idx].p.emoji)||'☕';
  const av=document.querySelector('.char[data-role="tester"] .face');
  if(av){av.textContent=role==='tester'?tEmoji:'';}
  document.querySelectorAll('.char .av').forEach(a=>{const k=a.dataset.emoji;a.querySelector('.face').textContent=k==='tester'?tEmoji:CHARS[k].emoji});
}

function playScene(t){
  const sc=t.sc;_lastPi=t.pi;
  document.querySelectorAll('.ptab').forEach(x=>x.classList.toggle('on',+x.dataset.pi===t.pi));
  document.querySelectorAll('.pdca .st').forEach(s=>s.classList.toggle('on',s.dataset.p===sc.phase));
  setActive(sc.actor);
  $('who').innerHTML = sc.actor==='tester'
    ? `${(sc.avatar&&sc.avatar.emoji)||t.p.emoji} ${(sc.avatar&&sc.avatar.name)||t.p.name}（疑似ユーザー）`
    : `${CHARS[sc.actor].emoji} ${CHARS[sc.actor].name}`;
  $('bubble').className='bubble'+(sc.tone==='bug'?' bug':sc.tone==='ok'?' ok':'');
  if(sc.shotIdx>=0 && t.p.shots[sc.shotIdx]){
    showShot(t.p, sc.shotIdx);
    $('nowscreen').textContent=t.p.shots[sc.shotIdx].label;
    touchPhone();
  } else if(_lastShot){ $('nowscreen').textContent='AIが考え中…'; }
  if(sc.badge){toast((sc.badge==='high'?'🔴':'🟠')+' 発見: '+sc.say.replace(/^【.*?】/,''))}
  typeText(sc.say);
}

function showShot(p,i){
  const sc=$('screen');
  [...sc.querySelectorAll('img')].forEach(im=>im.remove());
  const img=document.createElement('img');
  img.src='data:image/png;base64,'+p.shots[i].b64;
  sc.insertBefore(img,sc.firstChild);
  requestAnimationFrame(()=>img.classList.add('show'));
  _lastShot=img;
}
function touchPhone(){
  const f=$('finger'),r=$('ripple');
  const x=40+Math.random()*60, y=45+Math.random()*30;
  r.style.left=x+'%';r.style.top=y+'%';f.style.left=x+'%';f.style.top=y+'%';
  f.classList.add('show');r.classList.remove('go');void r.offsetWidth;r.classList.add('go');
  setTimeout(()=>f.classList.remove('show'),700);
}

function playMeeting(t){
  if(t.first){banner('全体ミーティング','本日の疑似利用 ふりかえり')}
  document.querySelectorAll('.pdca .st').forEach(s=>s.classList.toggle('on',s.dataset.p==='act'));
  document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('on'));
  $('crew').classList.add('meeting');
  const role=t.m.actor;
  document.querySelectorAll('.char').forEach(c=>c.classList.toggle('on',c.dataset.role===role));
  document.querySelectorAll('.char .av').forEach(a=>{const k=a.dataset.emoji;a.querySelector('.face').textContent=CHARS[k].emoji});
  $('who').innerHTML=`${t.m.emoji} ${t.m.name}`;
  $('bubble').className='bubble';
  typeText(t.m.say);
}
function banner(tt,pp){$('bannerT').textContent=tt;$('bannerP').textContent=pp;$('banner').classList.add('show');setTimeout(()=>$('banner').classList.remove('show'),2200)}

function typeText(text){
  clearTimeout(typing);clearTimeout(sceneTimer);
  const el=$('say');el.textContent='';let i=0;
  const step=()=>{
    if(!playing)return;
    el.textContent=text.slice(0,i++);
    if(i<=text.length){typing=setTimeout(step,28/speed)}
    else{const dur=Math.min(5200,Math.max(1500,text.length*60))/speed;sceneTimer=setTimeout(next,dur)}
  };
  step();
}
function next(){if(!playing)return;idx++;if(idx>=timeline.length){if(loop){idx=0}else{playing=false;$('play').textContent='▶ 再生';return}}render()}
function jumpToPersona(pi){const i=timeline.findIndex(t=>t.kind==='scene'&&t.pi===pi);if(i>=0){idx=i;playing=true;$('play').textContent='⏸ 一時停止';render()}}

function toast(msg, clickable=false){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),clickable?6000:3200);
  if(clickable){
    t.style.cursor='pointer';
    t.onclick=()=>{t.classList.remove('show');loadSession().then(({cycles})=>initWithCycles(cycles,cycles.length-1))};
  } else {
    t.style.cursor='default';t.onclick=null;
  }
}
function openReport(){
  const p=session.personas[_lastPi];if(!p)return;
  $('drawerT').textContent=`${p.emoji} ${p.name} のレポート`;
  let txt=`記録 ${p.counts.visits}杯 / カフェ ${p.counts.cafes}軒 / 気になる ${p.counts.wishes}軒\n\n`;
  txt+='■ 自動検出\n'+(p.findings.length?p.findings.map(f=>`[${f.sev}] (${f.screen}) ${f.msg}`).join('\n'):'なし ✅');
  txt+='\n\n■ AIユーザー目線レビュー\n'+(p.aiReview||'（Anthropic APIクレジットが入ると、ここにHaikuの詳細レビューが入ります）');
  $('drawerC').textContent=txt;$('drawer').classList.add('open');
}
function findStat(){
  const f=session.personas.flatMap(p=>p.findings);
  const h=f.filter(x=>x.sev==='high').length,m=f.filter(x=>x.sev==='med').length;
  $('findStat').innerHTML=`<span class="dot ${h?'h':'ok'}"></span>高 ${h}　<span class="dot ${m?'m':'ok'}"></span>中 ${m}`;
}
</script>

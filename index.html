document.addEventListener('pointermove',e=>{
  const hero=document.querySelector('.hero .tilt');if(!hero)return;
  const r=hero.getBoundingClientRect();
  if(e.clientY<r.top-200||e.clientY>r.bottom+200)return;
  const dx=(e.clientX-(r.left+r.width/2))/r.width;
  const dy=(e.clientY-(r.top+r.height/2))/r.height;
  hero.style.transform=`rotateY(${dx*6}deg) rotateX(${-dy*5}deg)`;
});
document.addEventListener('pointerleave',()=>{
  const hero=document.querySelector('.hero .tilt');
  if(hero)hero.style.transform='';
});

/* =============== pull-to-record（ホームで下に引いて記録） =============== */
(function(){
  const ind=$('#pullInd');let sy=0,pulling=false,dist=0;
  window.addEventListener('touchstart',e=>{
    pulling=(_curView()==='home'&&window.scrollY<=0&&!$('#sheet').classList.contains('open'));
    if(pulling){sy=e.touches[0].clientY;dist=0}
  },{passive:true});
  window.addEventListener('touchmove',e=>{
    if(!pulling)return;
    dist=e.touches[0].clientY-sy;
    if(dist>0&&window.scrollY<=0){
      ind.style.opacity=Math.min(1,dist/90);
      ind.style.transform=`translateX(-50%) translateY(${Math.min(dist*.45,52)}px)`;
      ind.classList.toggle('ready',dist>90);
      $('#pullTxt').textContent=dist>90?'はなして記録':'引いて記録する';
    }else if(dist<0){pulling=false;ind.style.opacity='0'}
  },{passive:true});
  window.addEventListener('touchend',()=>{
    if(pulling&&dist>90){if(navigator.vibrate)navigator.vibrate(12);openAdd()}
    if(ind){ind.style.opacity='0';ind.style.transform='translateX(-50%)';ind.classList.remove('ready')}
    pulling=false;dist=0;
  },{passive:true});
})();

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
/* =============== Liquid Coffee — WebGL background =============== */
(function(){
  if(location.search.includes('lab'))return; // Labモード：WebGL無効（自動監査の安定化）
  if(!window.THREE)return;
  const cv=document.getElementById('bg3d');
  const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  const scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0xf5efe4,14,34);
  const cam=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,100);
  cam.position.set(0,0,16);

  // warm studio lighting
  scene.add(new THREE.AmbientLight(0xfff3e0,.85));
  const key=new THREE.DirectionalLight(0xfff0d8,1.6);key.position.set(6,10,8);scene.add(key);
  const rim=new THREE.DirectionalLight(0xffc890,.9);rim.position.set(-8,-4,-6);scene.add(rim);
  const fill=new THREE.PointLight(0xffe8c8,.7,40);fill.position.set(0,-6,10);scene.add(fill);

  // coffee bean: two scaled hemispheres with a crease
  function beanGeo(){
    const g=new THREE.SphereGeometry(1,48,32);
    const p=g.attributes.position;
    for(let i=0;i<p.count;i++){
      let x=p.getX(i),y=p.getY(i),z=p.getZ(i);
      // bean proportions
      y*=.62;z*=.42;
      // crease along the top
      const crease=Math.exp(-Math.pow(x*3.2,2));
      if(z>0)z-=crease*.22;
      // slight banana curve
      z+=Math.pow(x,2)*.12;
      p.setXYZ(i,x,y,z);
    }
    g.computeVertexNormals();
    return g;
  }
  const geo=beanGeo();
  const roasts=[0x4a2f1d,0x5d3a22,0x6e4527,0x3a2515,0x7d5430];
  const beans=[];
  const N=innerWidth<700?14:22;
  for(let i=0;i<N;i++){
    const m=new THREE.MeshPhysicalMaterial({
      color:roasts[i%roasts.length],roughness:.32,metalness:0,
      clearcoat:1,clearcoatRoughness:.18,sheen:.4,sheenColor:0xffd9a8,
    });
    const b=new THREE.Mesh(geo,m);
    const s=.5+Math.random()*1.05;
    b.scale.setScalar(s);
    b.position.set((Math.random()-.5)*24,(Math.random()-.5)*18,-5-Math.random()*12);
    b.rotation.set(Math.random()*6.28,Math.random()*6.28,Math.random()*6.28);
    b.userData={r0:b.rotation.clone(),p0:b.position.clone(),
      sp:.12+Math.random()*.25,ph:Math.random()*6.28,amp:.5+Math.random()*.9};
    scene.add(b);beans.push(b);
  }
  // soft cream orbs for depth
  const orbMat=new THREE.MeshPhysicalMaterial({color:0xfdf6e8,roughness:.95,transparent:true,opacity:.5});
  for(let i=0;i<6;i++){
    const o=new THREE.Mesh(new THREE.SphereGeometry(2.4+Math.random()*2,24,16),orbMat);
    o.position.set((Math.random()-.5)*30,(Math.random()-.5)*20,-16-Math.random()*10);
    scene.add(o);
  }

  let mx=0,my=0,tx=0,ty=0;
  addEventListener('pointermove',e=>{tx=(e.clientX/innerWidth-.5);ty=(e.clientY/innerHeight-.5)});
  addEventListener('deviceorientation',e=>{if(e.gamma!=null){tx=e.gamma/90;ty=(e.beta-45)/90}});
  addEventListener('resize',()=>{
    renderer.setSize(innerWidth,innerHeight);
    cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  });
  let scrollY=0,lastY=0,vel=0;
  addEventListener('scroll',()=>{
    vel+=Math.min(Math.abs(window.scrollY-lastY)*.002,.18);
    lastY=window.scrollY;scrollY=window.scrollY;
  });

  const clock=new THREE.Clock();
  (function tick(){
    requestAnimationFrame(tick);
    if(document.body.classList.contains('map-mode'))return;
    const t=clock.getElapsedTime();
    mx+=(tx-mx)*.04;my+=(ty-my)*.04;
    cam.position.x=mx*2.2;cam.position.y=-my*1.6+scrollY*-.002;
    cam.lookAt(0,0,-4);
    vel*=.93; // scroll energy decays
    beans.forEach(b=>{
      const u=b.userData;
      b.position.y=u.p0.y+Math.sin(t*u.sp+u.ph)*u.amp;
      b.position.x=u.p0.x+Math.cos(t*u.sp*.7+u.ph)*u.amp*.5;
      u.spin=(u.spin||0)+u.sp*(0.006+vel*.06);
      b.rotation.x=u.r0.x+u.spin*.6;
      b.rotation.y=u.r0.y+u.spin*.4;
    });
    renderer.render(scene,cam);
  })();
})();
</script>
